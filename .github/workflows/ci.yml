# CI ringan — hanya quality gate (type-check, test, build).
# Deploy ditangani oleh Vercel (import repo di Vercel, build otomatis tiap push).
# Tidak butuh secret apa pun (data dari seed.json + proyek dari GitHub publik).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (astro check)
        run: npx astro check

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build
