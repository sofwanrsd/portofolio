# ============================================================================
# apache-vhost.conf - Contoh konfigurasi Apache VirtualHost (REFERENSI)
# Portfolio_Website (Build_Statis Astro) dilayani oleh Apache di VPS.
#
# Cara pakai (di VPS):
#   1. Salin/sesuaikan berkas ini ke konfigurasi Apache, mis.:
#        /etc/apache2/sites-available/portfolio.conf   (Debian/Ubuntu)
#        /etc/httpd/conf.d/portfolio.conf              (RHEL/CentOS)
#   2. Sesuaikan DocumentRoot ke direktori build yang dideploy.
#   3. Pastikan modul aktif: mod_rewrite, mod_deflate
#        a2enmod rewrite deflate   (Debian/Ubuntu)
#   4. Aktifkan & reload:
#        a2ensite portfolio && systemctl reload apache2
#
# Catatan fase awal: situs diakses via Alamat_IP_VPS dengan HTTP. TIDAK ada
# pengalihan ke HTTPS (Req 9.1, 9.2). Blok TLS di bawah dikomentari dan baru
# diaktifkan setelah domain tersedia (Req 9.3).
# ============================================================================

# ----------------------------------------------------------------------------
# Fase awal: VirtualHost HTTP pada port 80 (Req 8.1, 8.3, 9.1, 9.2)
# ----------------------------------------------------------------------------
<VirtualHost *:80>
    # Pada fase awal diakses lewat Alamat_IP_VPS, jadi ServerName boleh IP VPS.
    # Setelah domain tersedia, ganti dengan nama domain.
    ServerName 0.0.0.0
    # ServerAlias www.contoh-domain.com

    # DocumentRoot menunjuk ke direktori build statis yang dideploy (Req 8.3).
    # Pipeline_CICD melakukan atomic swap ke direktori ini.
    DocumentRoot "/var/www/portfolio/current"

    <Directory "/var/www/portfolio/current">
        # Izinkan .htaccess (yang disalin Astro dari public/) untuk menambah
        # ErrorDocument, mod_deflate, dan aturan rewrite /admin (Req 8.2, 8.4).
        AllowOverride All

        Options -Indexes +FollowSymLinks
        Require all granted

        # Berkas default yang dilayani untuk direktori
        DirectoryIndex index.html
    </Directory>

    # ----------------------------------------------------------------------
    # Pengaturan berikut juga tersedia di public/.htaccess. Disertakan di sini
    # agar tetap berfungsi bila "AllowOverride None" dipakai untuk performa.
    # ----------------------------------------------------------------------

    # Halaman 404 kustom (Req 8.2)
    ErrorDocument 404 /404.html

    # Kompresi teks (Req 8.4)
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html
        AddOutputFilterByType DEFLATE text/css
        AddOutputFilterByType DEFLATE application/javascript
        AddOutputFilterByType DEFLATE text/javascript
        AddOutputFilterByType DEFLATE application/json
        AddOutputFilterByType DEFLATE image/svg+xml
    </IfModule>

    # Fallback SPA untuk Halaman_Admin (/admin)
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} ^/admin
        RewriteRule . /admin/index.html [L]
    </IfModule>

    # Logging
    ErrorLog  "/var/log/apache2/portfolio_error.log"
    CustomLog "/var/log/apache2/portfolio_access.log" combined

    # CATATAN: TIDAK ada "Redirect" / "RewriteRule" ke https:// pada fase awal.
    # Permintaan HTTP dilayani apa adanya (Req 9.1, 9.2).
</VirtualHost>

# ============================================================================
# FASE MENDATANG (Req 9.3): aktifkan setelah domain + sertifikat TLS tersedia.
# Hapus komentar blok di bawah, isi nama domain dan jalur sertifikat, lalu
# (opsional) aktifkan pengalihan HTTP -> HTTPS pada VirtualHost *:80 di atas.
# ============================================================================
#
